# RabbitMQ Secrets - TEMPLATE (DO NOT COMMIT REAL VALUES)
# Copy to rabbitmq-secrets.yml (gitignored), fill in real values, then create secret manually
#
# Instructions:
#   1. Copy this file to rabbitmq-secrets.yml (gitignored)
#   2. Base64 encode values: echo -n "password" | base64
#   3. Apply: kubectl apply -f rabbitmq-secrets.yml -n staging
#
# Generate bcrypt hash for basicauth:
#   docker run --rm httpd:2.4-alpine htpasswd -nbBC 10 admin <password>
#   echo -n "admin:$2y$10$..." | base64

---
# RabbitMQ Credentials
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: robson
    environment: staging
type: Opaque
data:
  # Replace with actual base64-encoded values
  admin-username: YWRtaW4=        # "admin" — REPLACE
  admin-password: Y2hhbmdlbWU=    # "changeme" — REPLACE
  app-username: cm9ic29uLWFwcA==  # "robson-app"
  app-password: Y2hhbmdlbWU=      # "changeme" — REPLACE
  erlang-cookie: cmFuZG9tLWNvb2tpZS1oZXJl  # Random 32-char string — REPLACE

---
# BasicAuth Credentials for Management UI (used by rabbitmq-basicauth Middleware)
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-basicauth-secret
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: robson
    environment: staging
type: Opaque
data:
  # users file format: username:bcrypt-hash (base64 encoded)
  users: YWRtaW46JDJ5JDEwJC4uLg==  # REPLACE with real bcrypt hash
