# RabbitMQ Services - Staging
# AMQP (headless), Management UI, Prometheus
---
# AMQP Service (headless, internal-only)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-amqp
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: robson
    component: amqp
    environment: staging
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 5672
    targetPort: 5672
    protocol: TCP
    name: amqp
  - port: 4369
    targetPort: 4369
    protocol: TCP
    name: epmd
  - port: 25672
    targetPort: 25672
    protocol: TCP
    name: dist
  selector:
    app: rabbitmq

---
# Management UI Service (public via Ingress)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: robson
    component: management
    environment: staging
spec:
  type: ClusterIP
  ports:
  - port: 15672
    targetPort: 15672
    protocol: TCP
    name: http
  selector:
    app: rabbitmq

---
# Prometheus Metrics Service
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-prometheus
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: robson
    component: metrics
    environment: staging
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "15692"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 15692
    targetPort: 15692
    protocol: TCP
    name: prometheus
  selector:
    app: rabbitmq
