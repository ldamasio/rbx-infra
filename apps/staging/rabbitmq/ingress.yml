# Ingress: rabbitmq.staging.rbx.ia.br
# RabbitMQ Management UI - Staging
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: rabbitmq-staging-ingress
    app.kubernetes.io/part-of: rbx-infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rabbitmq.staging.rbx.ia.br
      secretName: rabbitmq-staging-tls
  rules:
    - host: rabbitmq.staging.rbx.ia.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rabbitmq-management
                port:
                  number: 15672
