# Kustomization for Staging Environment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: robson
  environment: staging

resources:
  # Network policies
  - network-policies/isolation.yml
  # Traefik middlewares
  - traefik-middlewares.yml
  # PostgreSQL (ParadeDB)
  - postgres/postgres-staging.yml
  # Redis
  - redis/redis-staging.yml
  # RabbitMQ
  - rabbitmq/rabbitmq-rbac.yml
  - rabbitmq/rabbitmq-configmap.yml
  - rabbitmq/rabbitmq-statefulset.yml
  - rabbitmq/rabbitmq-services.yml
  - rabbitmq/rabbitmq-networkpolicy.yml
  - rabbitmq/ingress.yml
  # Backend application
  - backend/backend-staging.yml
  - backend/cronjob-stop-monitor.yml
  # Ingress
  - ingress/api-staging.yml

images:
  - name: ghcr.io/ldamasio/rbs-backend-monolith
    newName: ghcr.io/ldamasio/rbs-backend-monolith
    newTag: staging-latest
