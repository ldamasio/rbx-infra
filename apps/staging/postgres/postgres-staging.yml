# PostgreSQL Staging (ParadeDB)
# PVC + Service + Deployment + ConfigMap
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-staging-data
  namespace: staging
  labels:
    app.kubernetes.io/name: postgres-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: postgres-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres-staging

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: postgres-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-staging
  template:
    metadata:
      labels:
        app: postgres-staging
        environment: staging
    spec:
      containers:
      - name: postgres
        image: paradedb/paradedb:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-staging
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-staging
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-staging
              key: POSTGRES_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - robson_staging
            - -d
            - robson_staging
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - robson_staging
            - -d
            - robson_staging
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-staging-data
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-staging-init
  namespace: staging
  labels:
    app.kubernetes.io/name: postgres-staging
    app.kubernetes.io/part-of: robson
    environment: staging
data:
  init.sql: |
    -- PostgreSQL initialization script for staging
    CREATE SCHEMA IF NOT EXISTS audit;
    CREATE SCHEMA IF NOT EXISTS monitoring;

    GRANT ALL PRIVILEGES ON SCHEMA public TO robson_staging;
    GRANT ALL PRIVILEGES ON SCHEMA audit TO robson_staging;
    GRANT ALL PRIVILEGES ON SCHEMA monitoring TO robson_staging;

    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS btree_gin;
    CREATE EXTENSION IF NOT EXISTS btree_gist;

    SELECT 'PostgreSQL staging initialized' AS status;
