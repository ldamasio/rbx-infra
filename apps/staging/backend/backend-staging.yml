# Backend Staging (Django Monolith)
# Service + Deployment + HPA
apiVersion: v1
kind: Service
metadata:
  name: backend-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: backend-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: backend-staging

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: backend-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend-staging
  template:
    metadata:
      labels:
        app: backend-staging
        tier: backend
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z postgres-staging 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: backend
        image: ghcr.io/ldamasio/rbs-backend-monolith:staging-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: ENVIRONMENT
          value: "staging"
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "api.staging.rbx.ia.br,backend-staging,backend-staging.staging.svc.cluster.local"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: REDIS_URL
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: RABBITMQ_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: SECRET_KEY
        - name: BINANCE_API_KEY
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: BINANCE_API_KEY
        - name: BINANCE_API_SECRET
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: BINANCE_API_SECRET
        - name: BINANCE_TESTNET
          value: "True"
        - name: RBS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-staging
              key: SECRET_KEY
        - name: RBS_PG_DATABASE
          value: "robson_staging"
        - name: RBS_PG_USER
          valueFrom:
            secretKeyRef:
              name: postgres-staging
              key: POSTGRES_USER
        - name: RBS_PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-staging
              key: POSTGRES_PASSWORD
        - name: RBS_PG_HOST
          value: "postgres-staging"
        - name: RBS_PG_PORT
          value: "5432"
        - name: GUNICORN_WORKERS
          value: "2"
        - name: GUNICORN_THREADS
          value: "4"
        - name: GUNICORN_TIMEOUT
          value: "120"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-staging-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-staging
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
