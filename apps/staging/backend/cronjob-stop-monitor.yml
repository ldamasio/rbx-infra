# CronJob: Stop Monitor Staging
# Monitors active operations and executes stop-loss/take-profit
# Schedule: Every 1 minute
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stop-monitor-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: stop-monitor-staging
    app.kubernetes.io/part-of: robson
    environment: staging
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: stop-monitor-staging
        environment: staging
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: stop-monitor-staging
            environment: staging
        spec:
          restartPolicy: Never
          imagePullSecrets:
          - name: ghcr-secret
          initContainers:
          - name: wait-for-backend
            image: busybox:1.36
            command:
            - sh
            - -c
            - |
              until nc -z backend-staging 8000; do
                echo "Waiting for backend..."
                sleep 2
              done
              echo "Backend is ready!"
          containers:
          - name: monitor
            image: ghcr.io/ldamasio/rbs-backend-monolith:staging-latest
            imagePullPolicy: Always
            command:
            - python
            - manage.py
            - monitor_stops
            - --json
            env:
            - name: ENVIRONMENT
              value: "staging"
            - name: DEBUG
              value: "False"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: RABBITMQ_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: SECRET_KEY
            - name: BINANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: BINANCE_API_KEY
            - name: BINANCE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: BINANCE_API_SECRET
            - name: BINANCE_TESTNET
              value: "True"
            - name: RBS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-staging
                  key: SECRET_KEY
            - name: RBS_PG_DATABASE
              value: "robson_staging"
            - name: RBS_PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-staging
                  key: POSTGRES_USER
            - name: RBS_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-staging
                  key: POSTGRES_PASSWORD
            - name: RBS_PG_HOST
              value: "postgres-staging"
            - name: RBS_PG_PORT
              value: "5432"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
