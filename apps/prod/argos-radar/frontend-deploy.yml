apiVersion: apps/v1
kind: Deployment
metadata:
  name: argos-radar-frontend
  namespace: argos-radar
  labels:
    app.kubernetes.io/name: argos-radar-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: argos-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argos-radar-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argos-radar-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: argos-radar-frontend
          image: ghcr.io/ldamasio/argos-radar-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
