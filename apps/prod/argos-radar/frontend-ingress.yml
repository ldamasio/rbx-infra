apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argos-radar-frontend-ingress
  namespace: argos-radar
  labels:
    app.kubernetes.io/name: argos-radar-frontend-ingress
    app.kubernetes.io/part-of: argos-radar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: argos-radar-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.argos.rbx.ia.br
      secretName: argos-radar-frontend-tls
  rules:
    - host: app.argos.rbx.ia.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argos-radar-frontend
                port:
                  number: 80
