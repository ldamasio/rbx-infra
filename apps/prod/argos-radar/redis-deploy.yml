apiVersion: apps/v1
kind: Deployment
metadata:
  name: argos-radar-redis
  namespace: argos-radar
  labels:
    app.kubernetes.io/name: argos-radar-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: argos-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argos-radar-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argos-radar-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
