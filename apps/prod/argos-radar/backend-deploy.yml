apiVersion: apps/v1
kind: Deployment
metadata:
  name: argos-radar-backend
  namespace: argos-radar
  labels:
    app.kubernetes.io/name: argos-radar-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: argos-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argos-radar-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argos-radar-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: argos-radar-backend
          image: ghcr.io/ldamasio/argos-radar-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
