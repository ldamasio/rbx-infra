# Service: rbx.ia.br + rbxsystems.ch
# ClusterIP — Traefik Ingress handles external routing
apiVersion: v1
kind: Service
metadata:
  name: rbx-ia-br-prod-svc
  namespace: robson
  labels:
    app.kubernetes.io/name: rbx-ia-br-prod-svc
    app.kubernetes.io/part-of: rbx-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rbx-ia-br-prod
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
