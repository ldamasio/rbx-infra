# Service: leandrodamasio.rbx.ia.br
# ClusterIP — Traefik Ingress handles external routing
apiVersion: v1
kind: Service
metadata:
  name: lda-prod-svc
  namespace: robson
  labels:
    app.kubernetes.io/name: lda-prod-svc
    app.kubernetes.io/part-of: rbx-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lda-prod
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
