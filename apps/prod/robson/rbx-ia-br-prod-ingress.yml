# Ingress: rbx.ia.br + rbxsystems.ch
# Both domains served by the same backend (rbx-ia-br-prod-svc)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rbx-ia-br-prod-ingress
  namespace: robson
  labels:
    app.kubernetes.io/name: rbx-ia-br-prod-ingress
    app.kubernetes.io/part-of: rbx-infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rbx.ia.br
      secretName: rbx-ia-br-prod-tls
    - hosts:
        - rbxsystems.ch
      secretName: rbxsystems-ch-prod-tls
  rules:
    - host: rbx.ia.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rbx-ia-br-prod-svc
                port:
                  number: 80
    - host: rbxsystems.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rbx-ia-br-prod-svc
                port:
                  number: 80
