apiVersion: apps/v1
kind: Deployment
metadata:
  name: thalamus
  namespace: thalamus
  labels:
    app.kubernetes.io/name: thalamus
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: thalamus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thalamus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thalamus
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: thalamus
          image: ghcr.io/ldamasio/thalamus
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
