apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: truthmetal-postgres
  namespace: truthmetal
  labels:
    app.kubernetes.io/name: truthmetal-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: truthmetal
spec:
  serviceName: truthmetal-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: truthmetal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: truthmetal-postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: truthmetal
            - name: POSTGRES_USER
              value: truthmetal
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: truthmetal-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "truthmetal"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 250m
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
