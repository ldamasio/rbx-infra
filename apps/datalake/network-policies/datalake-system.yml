# Network Policies for datalake-system Namespace
# Purpose: Isolate Hive Metastore and coordination services
# ADR-0013: Deep Storage Architecture
---
# Policy 1: Deny all ingress/egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: datalake-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Policy 2: Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: datalake-system
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Policy 3: Allow Hive Metastore Thrift access from analytics-jobs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hive-metastore
  namespace: datalake-system
spec:
  podSelector:
    matchLabels:
      app: hive-metastore
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: analytics-jobs
    - namespaceSelector:
        matchLabels:
          name: datalake-system
    ports:
    - protocol: TCP
      port: 9083

---
# Policy 4: Allow PostgreSQL access from Hive Metastore
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql
  namespace: datalake-system
spec:
  podSelector:
    matchLabels:
      app: hive-metastore
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: datalake-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432

---
# Policy 5: Allow Contabo S3 egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-s3-egress
  namespace: datalake-system
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Policy 6: Block staging namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-staging
  namespace: datalake-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchExpressions:
        - key: name
          operator: NotIn
          values:
          - staging
  egress:
  - to:
    - namespaceSelector:
        matchExpressions:
        - key: name
          operator: NotIn
          values:
          - staging
