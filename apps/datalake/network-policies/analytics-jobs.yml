# Network Policies for analytics-jobs Namespace
# Purpose: Isolate Spark jobs, allow S3 and Hive Metastore access
# ADR-0013: Deep Storage Architecture
---
# Policy 1: Deny all ingress/egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: analytics-jobs
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Policy 2: Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: analytics-jobs
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Policy 3: Allow Kubernetes API (Spark driver creates executor pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubernetes-api
  namespace: analytics-jobs
spec:
  podSelector:
    matchLabels:
      spark-app-selector: "true"
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Policy 4: Allow internal Spark communication (driver ↔ executors)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-spark-internal
  namespace: analytics-jobs
spec:
  podSelector:
    matchLabels:
      spark-app-selector: "true"
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: analytics-jobs
    ports:
    - protocol: TCP
      port: 7077
    - protocol: TCP
      port: 7078
    - protocol: TCP
      port: 7777
    - protocol: TCP
      port: 4040
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: analytics-jobs
    ports:
    - protocol: TCP
      port: 7077
    - protocol: TCP
      port: 7078
    - protocol: TCP
      port: 7777

---
# Policy 5: Allow Hive Metastore Thrift access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hive-metastore
  namespace: analytics-jobs
spec:
  podSelector:
    matchLabels:
      spark-app-selector: "true"
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: datalake-system
      podSelector:
        matchLabels:
          app: hive-metastore
    ports:
    - protocol: TCP
      port: 9083

---
# Policy 6: Allow Contabo S3 egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-s3-egress
  namespace: analytics-jobs
spec:
  podSelector:
    matchLabels:
      spark-app-selector: "true"
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Policy 7: Allow Django Outbox read access (bronze ingestion)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-django-outbox
  namespace: analytics-jobs
spec:
  podSelector:
    matchLabels:
      app: bronze-ingest
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: robson
      podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

---
# Policy 8: Block staging namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-staging
  namespace: analytics-jobs
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchExpressions:
        - key: name
          operator: NotIn
          values:
          - staging
  egress:
  - to:
    - namespaceSelector:
        matchExpressions:
        - key: name
          operator: NotIn
          values:
          - staging
