# Kustomization for Datalake
# Spark jobs for bronze/silver/gold ingestion and transformation
# ADR-0013: Deep Storage Architecture
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: rbx-datalake

resources:
  # RBAC (analytics-jobs namespace)
  - rbac/spark-rbac.yml
  # Network policies
  - network-policies/analytics-jobs.yml
  - network-policies/datalake-system.yml
  # Jobs (applied manually per-run, not by ArgoCD)
  # - jobs/bronze-ingest-job.yml
  # - jobs/silver-transform-job.yml

images:
  - name: ghcr.io/ldamasio/rbs-spark
    newName: ghcr.io/ldamasio/rbs-spark
    newTag: 3.5.0-phase0
