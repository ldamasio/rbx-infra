# ServiceAccount and RBAC for Spark on Kubernetes
# Purpose: Allow Spark driver to create executor pods in analytics-jobs namespace
# ADR-0013: Deep Storage Architecture
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-jobs
  namespace: analytics-jobs
  labels:
    app.kubernetes.io/name: spark-jobs
    app.kubernetes.io/part-of: rbx-datalake
    app: spark
    component: driver

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: analytics-jobs
  labels:
    app.kubernetes.io/name: spark-role
    app.kubernetes.io/part-of: rbx-datalake
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "delete", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: analytics-jobs
  labels:
    app.kubernetes.io/name: spark-role-binding
    app.kubernetes.io/part-of: rbx-datalake
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-role
subjects:
- kind: ServiceAccount
  name: spark-jobs
  namespace: analytics-jobs
