# Ingress: argocd.robson.rbx.ia.br
# ArgoCD UI with TLS termination at Traefik
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server-ingress
    app.kubernetes.io/part-of: rbx-infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # ArgoCD runs with --insecure so Traefik terminates TLS
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.robson.rbx.ia.br
      secretName: argocd-server-tls
  rules:
    - host: argocd.robson.rbx.ia.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
